<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout - MyShop</title>
<style>
body{font-family:system-ui;background:#f1f3f6;margin:0}
.container{max-width:650px;margin:auto;padding:15px}
.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:12px;
  background:#fb641b;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin-top:5px;
}
button:disabled{background:gray}
.total{font-weight:bold;font-size:18px}
.error{color:red;margin-top:5px;}
.loader{display:none;text-align:center;margin-top:10px}
</style>
</head>
<body>

<div class="container">

  <!-- ORDER SUMMARY -->
  <div class="card">
    <h3>Order Summary</h3>
    <div id="order-items"></div>
    <p id="subtotal"></p>
    <p id="discount"></p>
    <p class="total" id="total"></p>
  </div>

  <!-- SHIPPING DETAILS -->
  <div class="card">
    <h3>Shipping Details</h3>
    <input type="text" id="name" placeholder="Full Name">
    <input type="text" id="phone" placeholder="Phone Number">
    <input type="email" id="email" placeholder="Email Address" readonly>
    <input type="text" id="address" placeholder="Full Address">
    <input type="text" id="city" placeholder="City">
    <input type="text" id="state" placeholder="State">
    <input type="text" id="pin" placeholder="PIN Code">
  </div>

  <!-- PAYMENT OPTIONS -->
  <div class="card">
    <h3>Payment Options</h3>
    <button id="codBtn">Place Order (COD)</button>
    <button id="payBtn">Pay Online</button>
    <div class="loader" id="loader">Processing Order...</div>
    <p id="msg"></p>
  </div>

</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCQJLUFqF-tf8hr2lr5e6vMNwzVsvofMos",
  authDomain: "apna-store-4e151.firebaseapp.com",
  projectId: "apna-store-4e151",
  storageBucket: "apna-store-4e151.appspot.com",
  messagingSenderId: "326132934284",
  appId: "1:326132934284:web:2c455b1aafcaf3349d3da9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;
let cart = [];
let discountAmount = 0;

const msg = document.getElementById("msg");
const loader = document.getElementById("loader");
const codBtn = document.getElementById("codBtn");
const payBtn = document.getElementById("payBtn");
const orderItemsDiv = document.getElementById("order-items");

/* AUTH CHECK + LOAD CART FROM FIRESTORE */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    alert("Please login first!");
    window.location.href = "/login.html"; 
  } else {
    currentUser = user;
    document.getElementById("email").value = currentUser.email;

    // Load user shipping info if exists
    const userDoc = await getDoc(doc(db,"users",currentUser.uid));
    if(userDoc.exists()){
      const data = userDoc.data();
      if(data.name) document.getElementById("name").value = data.name;
      if(data.phone) document.getElementById("phone").value = data.phone;
      if(data.address) document.getElementById("address").value = data.address;
      if(data.city) document.getElementById("city").value = data.city;
      if(data.state) document.getElementById("state").value = data.state;
      if(data.pin) document.getElementById("pin").value = data.pin;
    }

    // Load cart
    const cartDoc = await getDoc(doc(db,"carts",currentUser.uid));
    if(cartDoc.exists()){
      const data = cartDoc.data();
      cart = data.items || [];
      discountAmount = data.discountAmount || 0; // automatically apply coupon discount
    }

    renderOrderSummary();
  }
});

/* RENDER ORDER SUMMARY */
function renderOrderSummary(){
  orderItemsDiv.innerHTML="";
  let subtotal = 0;

  if(cart.length===0){
    orderItemsDiv.innerHTML="<p>Cart is empty</p>";
    document.getElementById("subtotal").innerText="";
    document.getElementById("discount").innerText="";
    document.getElementById("total").innerText="";
    return;
  }

  cart.forEach(item=>{
    subtotal += item.price * item.quantity;
    const div = document.createElement("div");
    div.innerText = `${item.name} x ${item.quantity} - ₹${item.price*item.quantity}`;
    orderItemsDiv.appendChild(div);
  });

  document.getElementById("subtotal").innerText="Subtotal: ₹"+subtotal;
  document.getElementById("discount").innerText="Discount: ₹"+discountAmount;
  document.getElementById("total").innerText="Total: ₹"+(subtotal - discountAmount);
}

/* PLACE ORDER */
async function placeOrder(paymentMethod, paymentStatus="Pending"){
  msg.innerText=""; msg.className="";
  if(cart.length===0){ msg.innerText="Cart Empty ❌"; msg.className="error"; return; }

  const name=document.getElementById("name").value.trim();
  const phone=document.getElementById("phone").value.trim();
  const email=document.getElementById("email").value.trim();
  const address=document.getElementById("address").value.trim();
  const city=document.getElementById("city").value.trim();
  const state=document.getElementById("state").value.trim();
  const pin=document.getElementById("pin").value.trim();

  if(!name||!phone||!email||!address||!city||!state||!pin){
    msg.innerText="Fill all details ❌"; msg.className="error"; return;
  }

  codBtn.disabled = payBtn.disabled = true;
  loader.style.display="block";

  try{
    let subtotal = cart.reduce((sum,item)=>sum+(item.price*item.quantity),0);
    let finalTotal = subtotal - discountAmount;

    // CREATE ORDER
    const orderRef = await addDoc(collection(db,"orders"),{
      user_id: currentUser.uid,
      customer_name:name,
      customer_phone:phone,
      email:email,
      address:address,
      city:city,
      state:state,
      pin_code:pin,
      total_amount:subtotal,
      discount_amount:discountAmount,
      final_total:finalTotal,
      payment_method: paymentMethod,
      payment_status: paymentStatus,
      status:"Pending",
      createdAt: new Date()
    });

    const orderId = orderRef.id;

    // ADD ORDER ITEMS
    for(const item of cart){
      await addDoc(collection(db,"order_items"),{
        order_id:orderId,
        product_id:item.id,
        product_name:item.name,
        price:item.price,
        quantity:item.quantity,
        subtotal:item.price*item.quantity
      });
    }

    // CLEAR CART
    await updateDoc(doc(db,"carts",currentUser.uid), { items:[], discountAmount:0 });

    // COD: reduce stock immediately
    if(paymentMethod==="COD"){
      for(const item of cart){
        const ref = doc(db,"products",item.id);
        const snap = await getDoc(ref);
        const stock = snap.data().quantity;
        if(stock < item.quantity) throw new Error(item.name+" out of stock ❌");
        await updateDoc(ref,{ quantity: stock - item.quantity });
      }
      window.location.href="order success.html";
    }

    // ONLINE PAYMENT: reduce stock only after success
    if(paymentMethod==="Online"){
      const options = {
        key: "rzp_test_STJBno4rGHWIdV",
        amount: finalTotal*100,
        currency: "INR",
        name: "MyShop",
        description: "Order Payment",
        handler: async function (response){
          // reduce stock now
          for(const item of cart){
            const ref = doc(db,"products",item.id);
            const snap = await getDoc(ref);
            const stock = snap.data().quantity;
            if(stock < item.quantity) throw new Error(item.name+" out of stock ❌");
            await updateDoc(ref,{ quantity: stock - item.quantity });
          }

          await updateDoc(doc(db,"orders",orderId), { payment_status:"Paid" });
          alert("Payment Successful! Payment ID: "+response.razorpay_payment_id);
          window.location.href="/apna store app/order success.html";
        },
        prefill: { name, email, contact:phone },
        theme: {color:"#fb641b"}
      };
      const rzp = new Razorpay(options);
      rzp.open();
    }

  } catch(err){
    msg.innerText="Error: "+err.message;
    msg.className="error";
    codBtn.disabled = payBtn.disabled = false;
    loader.style.display="none";
  }
}

/* BUTTON EVENTS */
codBtn.addEventListener("click",()=>placeOrder("COD"));
payBtn.addEventListener("click",()=>placeOrder("Online","Pending"));

</script>
</body>
</html>
