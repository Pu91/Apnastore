<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyShop</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:system-ui, sans-serif;
  background:#f1f3f6;
  color:#212121;
}

/* HEADER (Flipkart style) */
.header{
  background:#2874f0;
  padding:10px;
  display:flex;
  align-items:center;
  gap:10px;
  position:sticky;
  top:0;
  z-index:1000;
}

.logo{
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

.search{
  flex:1;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
  font-size:14px;
}
.nav-links{
  display:flex;
  align-items:center;
  gap:10px;
}

/* ICON BUTTON */
.icon-btn{
  position:relative;
}

.icon-btn img{
  width:24px;
  height:24px;
}

/* CART BADGE */
.cart-badge{
  position:absolute;
  top:-5px;
  right:-6px;
  background:red;
  color:white;
  font-size:10px;
  padding:2px 5px;
  border-radius:50%;
}

/* CATEGORY ICON STYLE */
.category{
  display:flex;
  overflow-x:auto;
  background:white;
  padding:10px;
  gap:12px;
}

.category div{
  min-width:80px;
  background:#fff;
  border-radius:10px;
  padding:8px;
  text-align:center;
  font-size:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.category div.active{
  background:#2874f0;
  color:white;
}

/* BANNER */
.banner{
  margin:8px;
  border-radius:10px;
  overflow:hidden;
}

.banner-slide img{
  width:100%;
  height:150px;
  object-fit:cover;
}

/* OFFER GREEN BOX */
.offer-banner{
  margin:10px;
  background:linear-gradient(90deg,#d4fc79,#96e6a1);
  padding:15px;
  border-radius:12px;
  font-weight:600;
}

/* PRODUCTS SECTION */
.products{
  margin:10px 5px 80px;
}

/* ROW */
.product-row{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:5px;
}

/* CARD (Flipkart style) */
.card{
  min-width:150px;
  background:#fff;
  border-radius:12px;
  padding:10px;
  text-align:left;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

/* IMAGE */
.card img{
  width:100%;
  height:120px;
  object-fit:contain;
  border-radius:8px;
  background:#fff;
}

/* TITLE */
.card h3{
  font-size:13px;
  margin-top:6px;
  height:32px;
  overflow:hidden;
}

/* PRICE */
.price{
  font-size:15px;
  font-weight:600;
  color:#212121;
}

/* DISCOUNT STYLE */
.old-price{
  font-size:12px;
  text-decoration:line-through;
  color:#878787;
}

/* STOCK */
.stock{
  font-size:12px;
  margin-top:2px;
}

/* BUTTON */
button{
  margin-top:6px;
  background:#2874f0;
  border:none;
  color:white;
  padding:6px;
  border-radius:6px;
  font-size:13px;
}

.footer{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  display:flex;
  justify-content:space-around;
  align-items:center;
  padding:6px 0;
  border-top:1px solid #ddd;
  z-index:999;
}

.footer a{
  text-decoration:none;
  color:#777;
  font-size:11px;
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.footer a img{
  width:22px;
  height:22px;
}

.footer a.active{
  color:#2874f0;
}

/* CART BADGE */
.cart-count{
  position:absolute;
  top:-2px;
  right:-6px;
  background:red;
  color:white;
  font-size:10px;
  padding:2px 5px;
  border-radius:50%;
}
/* 🔽 style tag এর নিচে add করো */
#offlineScreen{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.offline-box{
  text-align:center;
  animation:fadeIn 0.5s ease;
}

.offline-box img{
  width:120px;
  margin-bottom:15px;
  animation:bounce 1.5s infinite;
}

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

</style>
<body>

<div class="header">
  <div class="logo">MyShop</div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Search products...">
  </div>
 <div class="nav-links">
  <a href="cart.html" class="icon-btn cart-icon">
    <img src="https://img.icons8.com/ios-filled/50/ffffff/shopping-cart.png">
  </a>

</div>
  </a>

</div>
</div>

<div class="offer-banner" id="offer-banner">Loading offer...</div>

<div class="category">
  <div data-cat="All" class="active">All</div>
  <div data-cat="Mobile">tranding</div>
  <div data-cat="Fashion">Fashion</div>
  <div data-cat="Electronics"></div>
  <div data-cat="Grocery">koria</div>
  <div data-cat="Appliances">jersey sports</div>
  <div data-cat="Books"></div>
</div>

<div class="banner">
  <div class="banner-track" id="banner-container"><div class="loading">Loading banners...</div></div>
</div>

<div class="products" id="products"><div class="loading">Checking login...</div></div>

<div class="footer">

  <a href="#" class="active">
    <img src="https://img.icons8.com/fluency/48/home.png">
    <span>Home</span>
  </a>

<a href="contract.html">
  <img src="https://img.icons8.com/fluency/48/phone.png">
  <span>Contact</span>
</a>

  <a href="offer.html">
    <img src="https://img.icons8.com/fluency/48/discount.png">
    <span>Offers</span>
  </a>

  <a href="profile.html">
    <img src="https://img.icons8.com/fluency/48/user-male-circle.png">
    <span>Account</span>
  </a>
  
  <a href="my order.html">
  <img src="https://img.icons8.com/fluency/48/delivery.png">
  <span>Orders</span>
</a>

<!-- 🔽 FOOTER এর নিচে বসাও -->
<div id="offlineScreen">
  <div class="offline-box">
    <img src="https://cdn-icons-png.flaticon.com/512/2748/2748558.png">
    <h2>No Internet</h2>
    <p>Please check your connection</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, getDocs, query, where, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCQJLUFqF-tf8hr2lr5e6vMNwzVsvofMos",
  authDomain: "apna-store-4e151.firebaseapp.com",
  projectId: "apna-store-4e151",
  storageBucket: "apna-store-4e151.appspot.com",
  messagingSenderId: "326132934284",
  appId: "1:326132934284:web:2c455b1aafcaf3349d3da9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let user = null;
let selectedCategory = "All";
let currentIndex = 0;
let totalSlides = 0;

/* LOGIN CHECK */
onAuthStateChanged(auth, (u)=>{
  user = u;
  loadProducts();
});

/* CATEGORY */
document.querySelectorAll(".category div").forEach(cat=>{
  cat.addEventListener("click",()=>{
    document.querySelectorAll(".category div").forEach(c=>c.classList.remove("active"));
    cat.classList.add("active");
    selectedCategory = cat.dataset.cat;
    loadProducts();
  });
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", loadProducts);

/* CART BUTTON CHECK */
document.querySelectorAll('.nav-links a[href="/apna store app/cart.html"]').forEach(link=>{
  link.addEventListener("click",(e)=>{
    if(!user){ e.preventDefault(); alert("Login first 🛒"); location.href="login.html"; }
  });
});

/* OFFER */
async function loadOffer(){
  const banner = document.getElementById("offer-banner");
  const snap = await getDocs(query(collection(db,"offers"),where("active","==",true)));
  if(snap.empty){ banner.innerHTML=""; return; }
  banner.innerHTML = snap.docs[0].data().title;
}

/* PRODUCTS */
async function loadProducts(){
  const container = document.getElementById("products");
  container.innerHTML="<div class='loading'>Loading...</div>";

  try{
    let snap;
    if(selectedCategory!=="All"){
      snap = await getDocs(query(collection(db,"products"),where("category","==",selectedCategory)));
    }else{
      snap = await getDocs(collection(db,"products"));
    }
    if(snap.empty){ container.innerHTML="<div class='loading'>No products found</div>"; return; }

    let data = snap.docs.map(d=>({id:d.id,...d.data()}));
    const search = document.getElementById("searchInput").value.toLowerCase();
    let filtered = data.filter(p=>p.name?.toLowerCase().includes(search));

    container.innerHTML="";
    const chunkSize = 5;

    for(let i=0;i<filtered.length;i+=chunkSize){
      let row = document.createElement("div");
      row.classList.add("product-row");

      filtered.slice(i,i+chunkSize).forEach(p=>{
        let img = p.image || p.images?.[0] || "https://via.placeholder.com/150";
        let stockText="", disabled="";
        if(p.quantity<=0){ stockText="<span style='color:red'>Out of Stock</span>"; disabled="disabled"; }
        else if(p.quantity<=3){ stockText=`<span style='color:orange'>Only ${p.quantity} left</span>`; }
        else stockText=`Stock: ${p.quantity}`;

        row.innerHTML += `
        <div class="card" onclick="window.location.href='/apna store app/productviews.html?id=${p.id}'">
          <img src="${img}">
          <h3>${p.name}</h3>
          <p class="price">₹${p.price}</p>
          <div class="stock">${stockText}</div>
          <button ${disabled} onclick="event.stopPropagation(); addToCart('${p.id}')">Add to Cart</button>
        </div>`;
      });

      container.appendChild(row);
    }
  }catch(err){ console.error(err); container.innerHTML="<div class='loading'>Error loading</div>"; }
}

/* ADD TO CART - FIRESTORE */
window.addToCart = async (productId)=>{
  if(!user){ alert("Login first"); location.href="login.html"; return; }

  const productSnap = await getDoc(doc(db,"products",productId));
  const product = productSnap.data();
  const cartRef = doc(db,"carts",user.uid);
  const cartSnap = await getDoc(cartRef);

  if(cartSnap.exists()){
    let items = cartSnap.data().items;
    const index = items.findIndex(p=>p.id===productId);
    if(index>=0){ items[index].quantity+=1; }
    else{ items.push({ id:productId, name:product.name, price:product.price, image:product.image || product.images?.[0], quantity:1 }); }
    await updateDoc(cartRef,{ items, updatedAt:new Date() });
  }else{
    await setDoc(cartRef,{ items:[{ id:productId, name:product.name, price:product.price, image:product.image || product.images?.[0], quantity:1 }], updatedAt:new Date() });
  }

  alert("Added to cart ✅");
};

/* BANNERS */
async function loadBanners(){
  const container = document.getElementById("banner-container");
  const snap = await getDocs(query(collection(db,"banners"),where("active","==",true)));
  if(snap.empty){ container.innerHTML=""; return; }
  container.innerHTML="";
  snap.forEach(doc=>{
    let b = doc.data();
    container.innerHTML += `<div class="banner-slide"><img src="${b.image}"></div>`;
  });
  totalSlides = snap.size;
  startSlide();
}

function startSlide(){
  const track = document.getElementById("banner-container");
  setInterval(()=>{
    currentIndex++;
    if(currentIndex>=totalSlides) currentIndex=0;
    track.style.transform = `translateX(-${currentIndex*100}%)`;
  },3000);
}
/* INIT */
loadOffer();
loadBanners();
</script>
<script>
  /* 🌐 INTERNET CHECK */
function updateOnlineStatus(){
  const offline = document.getElementById("offlineScreen");

  if(navigator.onLine){
    offline.style.display = "none";
  }else{
    offline.style.display = "flex";
  }
}

updateOnlineStatus();

window.addEventListener("online", updateOnlineStatus);
window.addEventListener("offline", updateOnlineStatus);
</script>
</body>
</html>
