<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Successful - MyShop</title>
<style>
body{font-family:system-ui;background:#f1f3f6;margin:0;padding:0;}
.container{max-width:650px;margin:auto;padding:20px}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
h2{text-align:center;color:green;}
p{margin:8px 0;font-size:16px;}
.label{font-weight:bold;}
button{
  width:100%;
  padding:12px;
  background:#2874f0;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
  <h2>🎉 Order Placed Successfully!</h2>
  <div class="card">
    <p><span class="label">Order ID:</span> <span id="order-id"></span></p>
    <p><span class="label">Subtotal:</span> ₹<span id="subtotal"></span></p>
    <p><span class="label">Discount:</span> ₹<span id="discount"></span></p>
    <p><span class="label">Total Amount:</span> ₹<span id="total"></span></p>
    <p><span class="label">Payment Method:</span> <span id="payment-method"></span></p>
    <p><span class="label">Payment Status:</span> <span id="payment-status"></span></p>
  </div>

  <button onclick="window.location.href='/apna store app/index.html'">Back to Home</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyCQJLUFqF-tf8hr2lr5e6vMNwzVsvofMos",
  authDomain: "apna-store-4e151.firebaseapp.com",
  projectId: "apna-store-4e151",
  storageBucket: "apna-store-4e151.appspot.com",
  messagingSenderId: "326132934284",
  appId: "1:326132934284:web:2c455b1aafcaf3349d3da9"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

onAuthStateChanged(auth, async (user)=>{
  if(!user){
    alert("Please login first!");
    window.location.href="/login.html";
    return;
  }

  try{
    // Fetch last order for this user
    const ordersRef = collection(db,"orders");
    const q = query(ordersRef, where("user_id","==",user.uid), orderBy("createdAt","desc"), limit(1));
    const querySnap = await getDocs(q);

    if(querySnap.empty){
      alert("No order found!");
      window.location.href="/apna store app/index.html";
      return;
    }

    const order = querySnap.docs[0].data();
    const orderId = querySnap.docs[0].id;

    // Populate order details
    document.getElementById("order-id").innerText = orderId;
    document.getElementById("subtotal").innerText = order.total_amount;
    document.getElementById("discount").innerText = order.discount_amount || 0;
    document.getElementById("total").innerText = order.final_total;
    document.getElementById("payment-method").innerText = order.payment_method;
    document.getElementById("payment-status").innerText = order.payment_status;

  }catch(err){
    alert("Error fetching order: "+err.message);
    window.location.href="/apna store app/index.html";
  }
});
</script>
</body>
</html>
